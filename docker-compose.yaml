services:
  db:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: mariadb
    environment:
      MARIADB_ROOT_PASSWORD: "projekti"
      MARIADB_DATABASE: "projekti"
    ports:
      - "3306:3306"
    volumes:
      - ./docker/init_database.sql:/docker-entrypoint-initdb.d/init_database.sql

  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      PMA_HOST: "db"
      PMA_PORT: 3306
      PMA_USER: "root"
      PMA_PASSWORD: "projekti"
